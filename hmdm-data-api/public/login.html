<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Device Data Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .login-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            font-size: 13px;
            color: #888;
            margin-top: 6px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-group input::placeholder {
            color: #555;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        .error-msg.visible {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="icon">🔐</div>
                <h1>Device Data Dashboard</h1>
                <p>Enter your Headwind MDM credentials</p>
            </div>
            
            <div class="error-msg" id="errorMsg"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username or email</label>
                    <input type="text" id="username" placeholder="Enter your username or email" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Sign In</span>
                </button>
            </form>
            <div class="login-footer">
                Uses same credentials as hmdmbackend.onrender.com
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            // Show loading
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            errorMsg.classList.remove('visible');
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: username, password: password })
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    // Store token and redirect
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    showError(data.message || 'Invalid username or password');
                }
            } catch (err) {
                showError('Connection error. Please try again.');
                console.error('Login error:', err);
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('visible');
        }
        
        // Check if already logged in
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                // Verify token is still valid
                fetch('/api/auth/verify', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(res => {
                    if (res.ok) window.location.href = '/dashboard';
                    else localStorage.removeItem('token');
                }).catch(() => {});
            }
        })();
    </script>
</body>
</html>
