<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Data Dashboard - Headwind MDM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4a;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            cursor: default;
        }
        .stat-card:hover { border-color: #4a4a6a; transform: translateY(-1px); }
        .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 6px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #fff; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.green { color: #34d399; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.orange { color: #fb923c; }
        .stat-card .value.cyan { color: #22d3ee; }

        /* Device Detail View */
        .device-detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .back-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: #3b82f6; color: #fff; }
        .device-detail-info {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
        }
        .device-detail-info .ddi-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .device-detail-info .ddi-desc {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .device-detail-info .ddi-id {
            font-size: 12px;
            color: #555;
            font-family: monospace;
            margin-top: 6px;
        }
        .device-detail-info .ddi-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1e1e38;
        }
        .device-detail-info .ddi-stat {
            font-size: 13px;
            color: #888;
        }
        .device-detail-info .ddi-stat strong { color: #ccc; }

        /* Data Section */        
        .data-section {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .data-section-header {
            padding: 14px 20px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .data-section-header:hover { background: rgba(255,255,255,0.02); }
        .data-section-header .ds-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .data-section-header .ds-title .ds-count {
            font-size: 12px;
            font-weight: 400;
            color: #888;
            margin-left: 8px;
        }
        .data-section-header .ds-toggle {
            font-size: 12px;
            color: #3b82f6;
            cursor: pointer;
        }
        .data-section-body {
            overflow-x: auto;
            transition: all 0.3s;
        }
        .data-section-body.collapsed { display: none; }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a4a;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid #1e1e38;
            color: #ccc;
        }
        tr:hover td { background: rgba(59,130,246,0.05); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-incoming { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge-outgoing { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .badge-missed { background: rgba(239,68,68,0.15); color: #ef4444; }
        .time { font-size: 11px; color: #666; white-space: nowrap; }

        .empty-section {
            padding: 30px 20px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }

        /* Device Grid */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            padding: 20px;
        }
        .device-card {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .device-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(59,130,246,0.15);
        }
        .device-card .device-main {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .device-card .device-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(124,58,237,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .device-card .device-name { font-weight: 600; font-size: 15px; color: #fff; }
        .device-card .device-desc { font-size: 12px; color: #666; margin-top: 2px; }
        .device-card .device-stats {
            display: flex; gap: 12px; margin-top: 10px;
            padding-top: 10px; border-top: 1px solid #1e1e38;
        }
        .device-card .device-stat { font-size: 12px; color: #888; }
        .device-card .device-stat strong { color: #ccc; }
        .device-card .last-seen { font-size: 11px; color: #555; margin-top: 6px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: #888; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        .toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .search-box input, .search-box select {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 8px 14px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 160px;
        }
        .search-box input:focus, .search-box select:focus { border-color: #3b82f6; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid #2a2a4a; color: #888; }
        .btn-outline:hover { border-color: #4a4a6a; color: #ccc; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pagination {
            display: flex; justify-content: center; gap: 8px; padding: 12px;
        }
        .pagination .page-btn {
            padding: 5px 10px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
        }
        .pagination .page-btn:hover { border-color: #3b82f6; color: #fff; }
        .pagination .page-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        /* Location map placeholder */
        .location-list {
            padding: 10px 0;
        }
        .location-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            border-bottom: 1px solid #1e1e38;
            font-size: 13px;
        }
        .location-item:last-child { border-bottom: none; }
        .location-item .loc-coords {
            font-family: monospace;
            color: #60a5fa;
            font-size: 12px;
        }
        .location-item .loc-time { color: #666; font-size: 11px; margin-left: auto; }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .device-grid { grid-template-columns: 1fr; }
            .device-detail-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📱 Device Data Dashboard</h1>
            <div class="subtitle">View contacts, call logs, notifications &amp; locations synced from Android devices</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline" onclick="logout()" title="Sign out">🚪 Sign Out</button>
            <button class="btn btn-primary" onclick="refreshAll()">🔄 Refresh</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="label">Total Contacts</div><div class="value blue" id="statContacts">-</div></div>
            <div class="stat-card"><div class="label">Call Logs</div><div class="value green" id="statCallLogs">-</div></div>
            <div class="stat-card"><div class="label">Notifications</div><div class="value purple" id="statNotifications">-</div></div>
            <div class="stat-card"><div class="label">Locations</div><div class="value cyan" id="statLocations">-</div></div>
            <div class="stat-card"><div class="label">Registered Devices</div><div class="value orange" id="statDevices">-</div></div>
        </div>
        
        <div id="mainContent"></div>
    </div>

    <script>
        let deviceList = [];
        let viewingDevice = null;

        function getToken() { return localStorage.getItem('token'); }
        function authHeaders() {
            const t = getToken();
            return t ? { 'Authorization': 'Bearer ' + t } : {};
        }
        async function fetchJSON(url, opts = {}) {
            const res = await fetch(url, { ...opts, headers: { ...authHeaders(), ...opts.headers } });
            if (res.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login';
                return;
            }
            if (!res.ok) throw new Error((await res.text()).substring(0,200));
            return res.json();
        }
        function esc(s) {
            if (!s && s !== 0) return '';
            const d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }
        function formatTime(ts) {
            if (!ts) return '-';
            const d = new Date(parseInt(ts) > 9999999999 ? parseInt(ts) : parseInt(ts)*1000);
            return isNaN(d.getTime()) ? '-' : d.toLocaleString();
        }
        function formatDuration(secs) {
            if (secs === null || secs === undefined) return '-';
            secs = parseInt(secs) || 0;
            if (secs < 60) return secs + 's';
            return Math.floor(secs/60) + 'm ' + (secs%60) + 's';
        }
        function getDeviceName(id) {
            if (!id) return '';
            const d = deviceList.find(x => x.device_id === id);
            return d ? d.name : id;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        async function loadSummary() {
            try {
                const d = await fetchJSON('/api/summary');
                document.getElementById('statContacts').textContent = (d.counts.contacts||0).toLocaleString();
                document.getElementById('statCallLogs').textContent = (d.counts.callLogs||0).toLocaleString();
                document.getElementById('statNotifications').textContent = (d.counts.notifications||0).toLocaleString();
                document.getElementById('statDevices').textContent = (d.counts.devices||0);
                // Get locations count separately
                try {
                    const loc = await fetchJSON('/api/locations?limit=0');
                    document.getElementById('statLocations').textContent = (loc.total||0).toLocaleString();
                } catch(e) {
                    document.getElementById('statLocations').textContent = '0';
                }
            } catch(e) { console.error('Summary error:', e); }
        }

        async function loadDevices() {
            try {
                const r = await fetchJSON('/api/devices');
                deviceList = r.data || [];
                return deviceList;
            } catch(e) {
                console.error('Devices error:', e);
                return [];
            }
        }

        async function renderDevices() {
            viewingDevice = null;
            const mc = document.getElementById('mainContent');
            mc.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading devices...</div></div>';
            
            if (deviceList.length === 0) await loadDevices();
            let devices = deviceList;
            
            if (devices.length === 0) {
                mc.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📱</div>
                        <h3>No Registered Devices</h3>
                        <p>Devices will appear here once they sync data to the server.</p>
                    </div>`;
                return;
            }
            
            let html = '<div class="device-grid">';
            for (const dev of devices) {
                html += `
                    <div class="device-card" onclick="showDeviceDetail('${esc(dev.device_id)}')">
                        <div class="device-main">
                            <div class="device-icon">📱</div>
                            <div>
                                <div class="device-name">${esc(dev.name)}</div>
                                <div class="device-desc">${esc(dev.model||dev.manufacturer||'Device')}${dev.android_version ? ' · Android '+esc(dev.android_version) : ''}</div>
                            </div>
                        </div>
                        <div class="device-stats">
                            <span class="device-stat"><strong>ID:</strong> <code style="color:#60a5fa;font-size:11px;">${esc(dev.device_id)}</code></span>
                        </div>
                        <div class="last-seen">${dev.synced_at ? 'Last synced: '+formatTime(dev.synced_at) : 'Never synced'}</div>
                    </div>`;
            }
            html += '</div>';
            mc.innerHTML = html;
        }

        async function showDeviceDetail(deviceId) {
            viewingDevice = deviceId;
            const mc = document.getElementById('mainContent');
            const dev = deviceList.find(d => d.device_id === deviceId) || { device_id: deviceId, name: deviceId };
            
            mc.innerHTML = `
                <div class="device-detail-header">
                    <button class="back-btn" onclick="renderDevices()">← Back to Devices</button>
                    <div class="device-detail-info">
                        <div class="ddi-name">${esc(dev.name)}</div>
                        <div class="ddi-desc">${esc(dev.model||dev.manufacturer||'')}${dev.android_version ? ' · Android '+esc(dev.android_version) : ''}</div>
                        <div class="ddi-id">Device ID: ${esc(dev.device_id)}</div>
                        <div class="ddi-stats">
                            <span class="ddi-stat">📇 <strong id="detailContacts">-</strong> Contacts</span>
                            <span class="ddi-stat">📞 <strong id="detailCalls">-</strong> Call Logs</span>
                            <span class="ddi-stat">🔔 <strong id="detailNotifs">-</strong> Notifications</span>
                            <span class="ddi-stat">📍 <strong id="detailLocs">-</strong> Locations</span>
                        </div>
                    </div>
                </div>
                <div id="deviceDataSections">
                    <div class="data-section"><div class="data-section-header"><div class="ds-title">📇 Loading contacts...</div></div><div class="loading"><div class="spinner"></div></div></div>
                    <div class="data-section"><div class="data-section-header"><div class="ds-title">📞 Loading call logs...</div></div><div class="loading"><div class="spinner"></div></div></div>
                    <div class="data-section"><div class="data-section-header"><div class="ds-title">🔔 Loading notifications...</div></div><div class="loading"><div class="spinner"></div></div></div>
                    <div class="data-section"><div class="data-section-header"><div class="ds-title">📍 Loading locations...</div></div><div class="loading"><div class="spinner"></div></div></div>
                </div>`;
            
            // Load all data sections in parallel
            await Promise.all([
                loadSectionData('contacts', deviceId),
                loadSectionData('calllogs', deviceId),
                loadSectionData('notifications', deviceId),
                loadSectionData('locations', deviceId)
            ]);
        }

        async function loadSectionData(type, deviceId) {
            const container = document.getElementById('deviceDataSections');
            const titles = {
                contacts: { icon: '📇', title: 'Contacts', color: '#60a5fa' },
                calllogs: { icon: '📞', title: 'Call Logs', color: '#34d399' },
                notifications: { icon: '🔔', title: 'Notifications', color: '#a78bfa' },
                locations: { icon: '📍', title: 'Locations', color: '#22d3ee' }
            };
            const t = titles[type];
            
            try {
                let url;
                if (type === 'locations') {
                    url = `/api/locations?deviceId=${encodeURIComponent(deviceId)}&limit=50`;
                } else {
                    url = `/api/${type}?deviceId=${encodeURIComponent(deviceId)}&limit=50`;
                }
                const result = await fetchJSON(url);
                const data = result.data || [];
                const total = result.total || 0;
                
                // Update the stat badge in header
                const statMap = { contacts: 'detailContacts', calllogs: 'detailCalls', notifications: 'detailNotifs', locations: 'detailLocs' };
                const statEl = document.getElementById(statMap[type]);
                if (statEl) statEl.textContent = total;
                
                let tableHtml = '';
                if (data.length === 0) {
                    tableHtml = `<div class="empty-section">No ${t.title.toLowerCase()} recorded for this device.</div>`;
                } else {
                    tableHtml = '<table><thead><tr>';
                    switch(type) {
                        case 'contacts':
                            tableHtml += '<th>Name</th><th>Phone</th><th>Type</th><th>Email</th><th>Synced</th></tr></thead><tbody>';
                            for (const c of data) {
                                tableHtml += `<tr><td><strong>${esc(c.name)}</strong></td><td>${esc(c.phone)}</td><td style="color:#888;font-size:12px;">${esc(c.phone_type)}</td><td style="color:#888;">${esc(c.email)}</td><td><span class="time">${formatTime(c.synced_at)}</span></td></tr>`;
                            }
                            break;
                        case 'calllogs':
                            tableHtml += '<th>Phone</th><th>Type</th><th>Duration</th><th>Contact</th><th>Date</th></tr></thead><tbody>';
                            for (const l of data) {
                                const tc = `badge-${(l.call_type||'unknown').toLowerCase()}`;
                                tableHtml += `<tr><td>${esc(l.phone_number)}</td><td><span class="badge ${tc}">${esc(l.call_type||'UNKNOWN')}</span></td><td>${formatDuration(l.duration_sec)}</td><td style="color:#888;">${esc(l.contact_name)}</td><td><span class="time">${formatTime(l.call_date)}</span></td></tr>`;
                            }
                            break;
                        case 'notifications':
                            tableHtml += '<th>App</th><th>Title</th><th>Text</th><th>Received</th></tr></thead><tbody>';
                            for (const n of data) {
                                tableHtml += `<tr><td style="color:#888;font-size:12px;">${esc(n.app_name||n.package_name)}</td><td><strong>${esc(n.title)}</strong></td><td style="color:#888;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(n.text_body)}</td><td><span class="time">${formatTime(n.received_at)}</span></td></tr>`;
                            }
                            break;
                        case 'locations':
                            tableHtml += '<th>Latitude</th><th>Longitude</th><th>Timestamp</th><th>Map</th></tr></thead><tbody>';
                            for (const l of data) {
                                const mapsUrl = `https://www.google.com/maps?q=${l.lat},${l.lon}`;
                                tableHtml += `<tr>
                                    <td class="loc-coords">${parseFloat(l.lat).toFixed(6)}</td>
                                    <td class="loc-coords">${parseFloat(l.lon).toFixed(6)}</td>
                                    <td><span class="time">${formatTime(l.ts)}</span></td>
                                    <td><a href="${mapsUrl}" target="_blank" style="color:#60a5fa;font-size:12px;text-decoration:none;">🗺️ Open Map</a></td>
                                </tr>`;
                            }
                            break;
                    }
                    tableHtml += '</tbody></table>';
                }
                
                const sectionHtml = `
                    <div class="data-section">
                        <div class="data-section-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
                            <div class="ds-title">${t.icon} ${t.title} <span class="ds-count">(${total})</span></div>
                            <div class="ds-toggle">▼</div>
                        </div>
                        <div class="data-section-body">${tableHtml}</div>
                    </div>`;
                
                container.insertAdjacentHTML('beforeend', sectionHtml);
            } catch(e) {
                console.error(`Error loading ${type}:`, e);
                const sectionHtml = `
                    <div class="data-section">
                        <div class="data-section-header">
                            <div class="ds-title">${t.icon} ${t.title} <span class="ds-count">(0)</span></div>
                        </div>
                        <div class="data-section-body"><div class="empty-section">Error loading: ${esc(e.message)}</div></div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', sectionHtml);
            }
        }

        async function refreshAll() {
            await Promise.all([loadSummary(), loadDevices()]);
            if (viewingDevice) {
                await showDeviceDetail(viewingDevice);
            } else {
                await renderDevices();
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            const token = getToken();
            if (!token) { window.location.href = '/login'; return; }
            // Check for ?device= param
            const params = new URLSearchParams(window.location.search);
            await Promise.all([loadSummary(), loadDevices()]);
            if (params.get('device')) {
                await showDeviceDetail(params.get('device'));
            } else {
                await renderDevices();
            }
        });
    </script>
</body>
</html>
